<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CIPHER | Admin Portal</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* Login Box Styles */
        #loginOverlay { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #0056b3; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Dashboard Styles (Hidden initially) */
        #dashboard { display: none; width: 90%; max-width: 1000px; height: 90vh; overflow-y: auto; background: white; padding: 30px; border-radius: 12px; }
        .report-card { border-left: 5px solid #0056b3; padding: 15px; margin-bottom: 15px; background: #f8f9fa; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <h2>🛡️ Admin Access</h2>
        <p>Please enter the Counselor password</p>
        <input type="password" id="adminPass" placeholder="Enter Password">
        <button onclick="checkLogin()">Login to Dashboard</button>
        <p id="error" style="color:red; display:none;">Incorrect Password!</p>
    </div>

    <div id="dashboard">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Guidance Counselor Dashboard</h1>
            <button onclick="location.reload()" style="width:auto; padding:8px 15px; background:#666;">Logout</button>
        </div>
        <hr>
        <div id="reportList"></div>
    </div>

   <script>
    const API_BASE = 'https://cipher-1-gyw.onrender.com/api';
    function checkLogin() {
        const pass = document.getElementById('adminPass').value;
        if(pass === "SHS2026") { // Your set password
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadReports();
        } else {
            document.getElementById('error').style.display = 'block';
        }
    }

    async function loadReports() {
        const list = document.getElementById('reportList');
        list.innerHTML = "<p>Retrieving data from TiDB Cloud...</p>";
        
        try {
            const response = await fetch(`${API_BASE}/reports`); 
            const reports = await response.json();

            if(!reports || reports.length === 0) {
                list.innerHTML = "<p>No reports in the database yet.</p>";
                return;
            }

            // Using the exact column names from your DESCRIBE result
            list.innerHTML = reports.map(r => {
                const status = r.status || 'Pending';
                const color = status === 'Resolved' ? '#28a745' : '#ffc107';
                
                return `
                <div class="report-card" style="border-left: 5px solid ${color}">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>Ref ID: ${r.reference_id || 'LEGACY'}</strong> 
                        <span style="color:${color}; font-weight:bold;">${status.toUpperCase()}</span>
                    </div>
                    <small>Logged: ${new Date(r.created_at).toLocaleString()}</small><br>
                    <strong>Incident:</strong> ${(r.incident_type || 'General').toUpperCase()}<br>
                    <p><strong>Details:</strong> ${r.description}</p>
                    
                    ${status === 'Pending' ? 
                        `<button onclick="updateStatus('${r.reference_id}')" style="width:auto; padding:5px 10px; font-size:12px; margin-top:10px; background:#28a745;">Mark as Resolved</button>` 
                        : ''}
                </div>`;
            }).reverse().join(''); 

        } catch (error) {
            list.innerHTML = "<p style='color:red;'>Error: Could not connect to the server. Check Render Logs.</p>";
        }
    }

    // New function to handle the Resolve button
    async function updateStatus(refId) {
        if(!refId || refId === 'null') return alert("Cannot resolve legacy reports without IDs.");
        
        try {
            const res = await fetch(`${API_BASE}/report/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reference_id: refId, status: 'Resolved' })
            });
            if (res.ok) {
                alert("Report " + refId + " resolved!");
                loadReports(); // Refresh the list
            }
        } catch (err) {
            alert("Update failed.");
        }
    }
</script>
</body>
</html>
